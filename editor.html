<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ジャンプマン - マップエディタ</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #181818;
        color: #eee;
        font-family: sans-serif;
        height: 100%;
      }
      #app {
        display: flex;
        height: 100vh;
      }
      #canvas-area {
        position: relative;
        flex: 1;
        background: #000;
        overflow: hidden;
      }
      #editor-canvas {
        background: #262626;
        cursor: crosshair;
        display: block;
      }
      #coords {
        position: absolute;
        left: 8px;
        bottom: 8px;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 8px;
        font-size: 12px;
        border-radius: 4px;
        pointer-events: none;
      }
      #hint {
        position: absolute;
        right: 8px;
        bottom: 8px;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 8px;
        font-size: 11px;
        border-radius: 4px;
        pointer-events: none;
        color: #aaa;
        text-align: right;
      }
      #side-panel {
        width: 340px;
        background: #202020;
        padding: 12px;
        overflow-y: auto;
        border-left: 1px solid #444;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 4px;
      }
      h2 {
        font-size: 13px;
        margin: 4px 0 2px;
        border-bottom: 1px solid #444;
        padding-bottom: 4px;
        color: #bbb;
      }
      #palette {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .tool-btn {
        background: #2b2b2b;
        border: 1px solid #555;
        color: #eee;
        padding: 8px 2px;
        font-size: 11px;
        cursor: pointer;
        border-radius: 4px;
        line-height: 1.4;
      }
      .tool-btn.selected {
        border-color: #f1c40f;
        background: #3a3a1a;
      }
      .tool-btn .key {
        display: block;
        opacity: 0.55;
        font-size: 10px;
      }
      form label {
        display: block;
        font-size: 12px;
        margin-top: 6px;
        color: #ccc;
      }
      form input,
      form select {
        width: 100%;
        padding: 4px;
        background: #111;
        border: 1px solid #555;
        color: #eee;
        border-radius: 3px;
        margin-top: 2px;
      }
      .row {
        display: flex;
        gap: 6px;
      }
      .row > * {
        flex: 1;
      }
      #actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      button {
        cursor: pointer;
        background: #2b2b2b;
        border: 1px solid #555;
        color: #eee;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      button:hover {
        background: #383838;
      }
      #errors {
        color: #ff6b6b;
        font-size: 12px;
        white-space: pre-wrap;
        min-height: 1em;
      }
      #autosave-status {
        color: #888;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-area">
        <canvas id="editor-canvas" width="960" height="640"></canvas>
        <div id="coords">x: -, y: -</div>
        <div id="hint">左ドラッグ: 配置 / 右ドラッグ: 消去<br />Space+ドラッグ or 中ボタン: パン / ホイール: ズーム</div>
      </div>
      <div id="side-panel">
        <h1>マップエディタ</h1>

        <h2>パレット(数字キー1-9)</h2>
        <div id="palette"></div>

        <h2>ステージ設定</h2>
        <form id="stage-form">
          <label>ID<input type="text" id="field-id" /></label>
          <label>名前<input type="text" id="field-name" /></label>
          <div class="row">
            <label>幅<input type="number" id="field-width" min="4" max="400" /></label>
            <label>高さ<input type="number" id="field-height" min="4" max="400" /></label>
          </div>
          <label>
            テーマ
            <select id="field-theme">
              <option value="grass">grass(草原)</option>
              <option value="cave">cave(洞窟)</option>
            </select>
          </label>
          <div class="row">
            <label>マナ初期値<input type="number" id="field-mana-initial" min="0" /></label>
            <label>マナ上限<input type="number" id="field-mana-max" min="0" /></label>
          </div>
          <div class="row">
            <label>マナ回復/秒<input type="number" id="field-mana-regen" min="0" step="0.1" /></label>
            <label>消去コスト<input type="number" id="field-erase-cost" min="0" /></label>
          </div>
        </form>

        <h2>ファイル</h2>
        <div id="actions">
          <button id="btn-new" type="button">新規</button>
          <button id="btn-download" type="button">JSONダウンロード</button>
          <button id="btn-load-file" type="button">ファイルから読込</button>
          <input type="file" id="file-input" accept="application/json" hidden />
          <button id="btn-load-local" type="button">下書きを読込</button>
          <button id="btn-load-sample1" type="button">stage01を複製</button>
          <button id="btn-load-sample2" type="button">stage02を複製</button>
          <button id="btn-testplay" type="button">テストプレイ</button>
        </div>
        <div id="autosave-status"></div>
        <div id="errors"></div>
      </div>
    </div>
    <script type="module" src="/src/app/editor/main.ts"></script>
  </body>
</html>
