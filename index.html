<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>ジャンプマン</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #202020;
        color: #eee;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        /* スマートフォンでのタッチスクロール・ピンチズーム・長押しメニュー等を抑止する */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game-canvas {
        image-rendering: pixelated;
        background: #000;
        max-width: 100%;
        max-height: 100vh;
        /* タッチ操作(タップ配置/消去)をブラウザのジェスチャー(スクロール/ズーム)に奪われないようにする */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas" width="1280" height="768"></canvas>
    <script type="module" src="/src/app/game/main.ts"></script>
  </body>
</html>
